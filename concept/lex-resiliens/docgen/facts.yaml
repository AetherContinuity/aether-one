# facts.yaml
#
# Jokainen luku joka esiintyy jossain LR-sarjan dokumentissa maaritellaan
# TASSA, kerran. Dokumentit eivat kirjoita lukuja - ne viittaavat nailla
# avaimilla. Jos sama tosiasia yrittaa saada kaksi eri arvoa, build.py
# kaatuu (duplicate key -> YAML-virhe tai validate.py:n oma tarkistus).
#
# status:
#   primary      = suoraan viralliselta lahteelta, pvm mainittu
#   interpolated = johdettu/arvioitu toisesta primary-luvusta, sanottu aareen
#   derived      = laskettu muista facts-arvoista (katso formulas.yaml)


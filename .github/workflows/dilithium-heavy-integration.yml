name: Dilithium Heavy Integration Tests (release/manual only)

# TAMA WORKFLOW SISALTAA raskaat, satojatuhansia sykleja vaativat
# integraatiotestit (Sign-orkestrointi yhdella referenssivektorilla,
# monisiemeninen Sign-testi, koko RTL-ketju KeyGen->Sign->Verify).
#
# STRATEGIA (kayttajan oma ehdotus): naita EI ajeta joka pushilla,
# koska ne vievat 10-20+ minuuttia mutta antavat vain vahan uutta
# tietoa sen jalkeen kun yksittaiset S1-S8-komponentit ja pakkaus on
# jo todistettu erikseen (nopeissa, jokaisella pushilla ajettavissa
# komponenttitesteissa ja Verify-regressiossa). Sen sijaan naita
# ajetaan:
#   - Kun julkaisutagi (v*) luodaan
#   - Kasin laukaistuna (workflow_dispatch)
#
# Jos jokin nailla loytaa regression, palataan takaisin nopeampiin
# komponenttitesteihin kaventamaan vikaa - EI kayteta tata pitkaa
# ajoa ensisijaisena debuggaustyokaluna.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  test-pqc-rtl-dilithium-sign-positive-heavy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: sudo apt-get update -qq && sudo apt-get install -y iverilog
      - name: Run Sign positive test (koko hylkayssilmukka + pakkaus, ~242000 sykli)
        run: bash hardware/pqc-rtl/run_integration_dilithium_sign_positive.sh

  test-pqc-rtl-dilithium-sign-multiseed-heavy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: sudo apt-get update -qq && sudo apt-get install -y iverilog
      - name: Run Sign multi-seed test (kolme riippumatonta siementa, ~726000 sykli yhteensa)
        run: bash hardware/pqc-rtl/run_integration_dilithium_sign_multiseed.sh

  test-pqc-rtl-dilithium-sign-nist-acvp-heavy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: sudo apt-get update -qq && sudo apt-get install -y iverilog
      - name: Run Sign vs. NIST ACVP sigGen-FIPS204 (aito hylkays-ja-uusintayritys, kappa 0->5, ~360000 sykli)
        run: bash hardware/pqc-rtl/run_integration_dilithium_sign_nist_acvp.sh

  test-pqc-rtl-dilithium-functional-flow-heavy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: sudo apt-get update -qq && sudo apt-get install -y iverilog
      - name: Run vaiheistettu functional flow (KeyGen->ek.txt/sk_state.txt->Sign->sig.txt->Verify->PASS/FAIL)
        run: bash hardware/pqc-rtl/run_integration_dilithium_functional_flow.sh
      - name: Tallenna valituotokset (ek.txt, sk_state.txt, sig.txt) myohempaa analyysia varten
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dilithium-functional-flow-artifacts
          path: |
            hardware/pqc-rtl/dilithium-rtl/staged/ek.txt
            hardware/pqc-rtl/dilithium-rtl/staged/sk_state.txt
            hardware/pqc-rtl/dilithium-rtl/staged/sig.txt
          if-no-files-found: ignore

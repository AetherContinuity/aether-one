name: verify

on:
  push:
  pull_request:

jobs:
  test-lex-resiliens-modules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest

      - name: Test wem_bridge (R/S derivation from WEM §12 fields)
        run: |
          cd concept/lex-resiliens/framework/wem_bridge
          python -m pytest test_wem_to_lr.py -v

      - name: Test generic_bridge (domain-agnostic trust log + golden runner)
        run: |
          cd concept/lex-resiliens/framework/generic_bridge
          python -m pytest test_generic_bridge.py -v

  run-pqc-rtl-m1-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: sudo apt-get update -qq && sudo apt-get install -y iverilog
      - name: Run M1 RTL verification (real simulation, not a text check)
        run: bash hardware/pqc-rtl/run_m1_test.sh

name: verify

on:
  push:
  pull_request:

jobs:
  test-lex-resiliens-modules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest

      - name: Test wem_bridge (R/S derivation from WEM §12 fields)
        run: |
          cd concept/lex-resiliens/framework/wem_bridge
          python -m pytest test_wem_to_lr.py -v

      - name: Test generic_bridge (domain-agnostic trust log + golden runner)
        run: |
          cd concept/lex-resiliens/framework/generic_bridge
          python -m pytest test_generic_bridge.py -v

      - name: Install docgen dependencies
        run: pip install pyyaml jinja2

      - name: Test docgen engine (facts/formulas -> document, no hand-typed numbers)
        run: |
          cd concept/lex-resiliens/docgen
          python -m pytest test_engine.py -v
          python build.py

  test-enroll-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps for liboqs
        run: sudo apt-get update -qq && sudo apt-get install -y cmake ninja-build build-essential libssl-dev
      - name: Build minimal liboqs (ML-DSA-65 only)
        run: |
          git clone --depth 1 https://github.com/open-quantum-safe/liboqs.git
          cd liboqs && mkdir build && cd build
          cmake -GNinja -DOQS_MINIMAL_BUILD="SIG_ml_dsa_65" -DOQS_USE_OPENSSL=ON -DBUILD_SHARED_LIBS=ON -DCMAKE_BUILD_TYPE=Release ..
          ninja -j$(nproc)
          sudo ninja install
          sudo ldconfig
      - name: Install Python deps
        run: pip install liboqs-python fastapi uvicorn cbor2 httpx
      - name: Start server and run live enroll attack test
        run: |
          cd pi5_edge_node
          (TRUSTCORE_DATA_DIR=.trustcore_server uvicorn core.trustcore.server:APP --port 8100 &)
          sleep 3
          python3 test_enroll_live.py

  test-client-tpm-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps for liboqs + tpm2-tools + swtpm
        run: sudo apt-get update -qq && sudo apt-get install -y cmake ninja-build build-essential libssl-dev tpm2-tools swtpm
      - name: Build minimal liboqs (ML-DSA-65 only)
        run: |
          git clone --depth 1 https://github.com/open-quantum-safe/liboqs.git
          cd liboqs && mkdir build && cd build
          cmake -GNinja -DOQS_MINIMAL_BUILD="SIG_ml_dsa_65" -DOQS_USE_OPENSSL=ON -DBUILD_SHARED_LIBS=ON -DCMAKE_BUILD_TYPE=Release ..
          ninja -j$(nproc)
          sudo ninja install
          sudo ldconfig
      - name: Install Python deps
        run: pip install liboqs-python fastapi uvicorn cbor2 httpx
      - name: Provision swtpm + AK handle
        run: |
          cd pi5_edge_node
          bash setup_swtpm.sh
      - name: Start server and run full TPM+PQC client e2e test
        run: |
          export TPM2TOOLS_TCTI="swtpm:host=localhost,port=2321"
          cd pi5_edge_node
          (TRUSTCORE_DATA_DIR=.trustcore_server uvicorn core.trustcore.server:APP --port 8100 &)
          sleep 3
          python3 test_client_e2e.py

  test-rvv-montgomery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install QEMU riscv64 + cross-toolchain
        run: sudo apt-get update -qq && sudo apt-get install -y qemu-user-static gcc-riscv64-linux-gnu
      - name: Build and run RVV Montgomery reduction (VLEN=256 and VLEN=128)
        run: |
          cd hardware/pqc-rtl/rvv
          bash run_rvv_test.sh

  test-tvm-riscv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install QEMU riscv64 + cross-toolchain + TVM
        run: |
          sudo apt-get update -qq && sudo apt-get install -y qemu-user-static gcc-riscv64-linux-gnu
          pip install apache-tvm
      - name: Build model, cross-compile, run under QEMU
        run: |
          cd hardware/pqc-rtl/tvm-riscv
          bash run_tvm_test.sh

  test-oqs-rvv-provider-skeleton:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install QEMU riscv64 + cross-toolchain
        run: sudo apt-get update -qq && sudo apt-get install -y qemu-user-static gcc-riscv64-linux-gnu
      - name: Build OpenSSL libcrypto for RISC-V (cross), then provider skeleton, run under QEMU
        run: |
          cd hardware/pqc-rtl/oqs-rvv-provider
          bash run_provider_test.sh

  test-rvv-dilithium-ntt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install QEMU riscv64 + cross-toolchain
        run: sudo apt-get update -qq && sudo apt-get install -y qemu-user-static gcc-riscv64-linux-gnu
      - name: Build reference, extract zetas, build RVV, run under QEMU
        run: |
          cd hardware/pqc-rtl/rvv-dilithium
          bash run_ntt_test.sh

  run-pqc-rtl-m1-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: sudo apt-get update -qq && sudo apt-get install -y iverilog
      - name: Run M1 RTL verification (real simulation, not a text check)
        run: bash hardware/pqc-rtl/run_m1_test.sh

  test-pqc-rtl-m3-golden-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run full ML-KEM golden-model end-to-end regression (1000 random seeds)
        run: |
          cd hardware/pqc-rtl
          python3 m2-golden/mlkem_regression.py 1000

  test-pqc-rtl-m3-kpke-roundtrip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: sudo apt-get update -qq && sudo apt-get install -y iverilog
      - name: Run full K-PKE KeyGen->Encrypt->Decrypt->m round-trip (real RTL, all primitives)
        run: bash hardware/pqc-rtl/run_m3_kpke_roundtrip_test.sh

  test-pqc-rtl-m3-mlkem-decaps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: sudo apt-get update -qq && sudo apt-get install -y iverilog
      - name: Run ML-KEM.Decaps_internal TB A (K-PKE.Decrypt + G)
        run: bash hardware/pqc-rtl/run_m3_mlkem_decaps_a_test.sh
      - name: Run ML-KEM.Decaps_internal TB B (K-PKE.Encrypt + FO selection, incl. implicit rejection)
        run: bash hardware/pqc-rtl/run_m3_mlkem_decaps_b_test.sh

  test-pqc-rtl-m3-keygen-multiseed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: sudo apt-get update -qq && sudo apt-get install -y iverilog
      - name: Run K-PKE.KeyGen 10x in same simulation (register-leak/reset check)
        run: bash hardware/pqc-rtl/run_m3_kpke_keygen_multiseed_test.sh

  test-pqc-rtl-m4-tau-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: sudo apt-get update -qq && sudo apt-get install -y iverilog
      - name: Run M4-TAU-001 end-to-end (ECU->Wishbone->KeyGen->audit-loki->ECU, success path)
        run: bash hardware/pqc-rtl/run_m4_tau_integrated_test.sh
      - name: Run M4-TAU-001 watchdog interrupt path (heartbeat loss mid-KeyGen -> audit log)
        run: bash hardware/pqc-rtl/run_m4_tau_watchdog_interrupt_test.sh
      - name: Run M4-TAU-001 audit log AUDIT_WORD_SEL multi-word regression
        run: bash hardware/pqc-rtl/run_m4_tau_audit_multiword_test.sh
      - name: Run M4-DECAPS Wishbone integration (fresh independent test vector)
        run: bash hardware/pqc-rtl/run_m4_tau_decaps_wishbone_test.sh
      - name: Run M4-DECAPS own audit events (STARTED+COMPLETED)
        run: bash hardware/pqc-rtl/run_m4_tau_decaps_audit_test.sh
      - name: Run M4-ENCAPS Wishbone integration (fresh independent test vector)
        run: bash hardware/pqc-rtl/run_m4_tau_encaps_wishbone_test.sh
      - name: Run M4-ENCAPS own audit events (STARTED+COMPLETED)
        run: bash hardware/pqc-rtl/run_m4_tau_encaps_audit_test.sh
      - name: Run full ML-KEM protocol chain (KeyGen->Encaps->Decaps, shared secret match, random input)
        run: bash hardware/pqc-rtl/run_m4_tau_full_protocol_test.sh

  test-pqc-rtl-dilithium-verify-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: sudo apt-get update -qq && sudo apt-get install -y iverilog
      - name: Run Verify positive test (aito allekirjoitus -> verify_ok=1)
        run: bash hardware/pqc-rtl/run_dilithium_verify_positive_test.sh
      - name: Run Verify negative-signature test (yhden bitin muutos allekirjoituksessa -> verify_ok=0)
        run: bash hardware/pqc-rtl/run_dilithium_verify_negative_sig_test.sh
      - name: Run Verify negative-pubkey test (yhden bitin muutos julkisessa avaimessa -> verify_ok=0)
        run: bash hardware/pqc-rtl/run_dilithium_verify_negative_pk_test.sh
      - name: Run Verify multi-seed test (kolme riippumatonta satunnaista avainparia -> verify_ok=1 kaikille)
        run: bash hardware/pqc-rtl/run_dilithium_verify_multiseed_test.sh

  test-pqc-rtl-verilator-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Verilator
        run: sudo apt-get update -qq && sudo apt-get install -y verilator
      - name: Lint every rtl/*.sv file, fail on any LATCH/UNDRIVEN/COMBDLY warning
        run: |
          cd hardware/pqc-rtl
          fail=0
          for f in rtl/*.sv; do
            out=$(verilator --lint-only -Wall "$f" 2>&1 || true)
            hits=$(echo "$out" | grep -i "LATCH\|UNDRIVEN\|COMBDLY" || true)
            if [ -n "$hits" ]; then
              echo "LATCH/UNDRIVEN/COMBDLY warning in $f:"
              echo "$hits"
              fail=1
            fi
          done
          exit $fail

  test-pqc-rtl-yosys-synth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Yosys
        run: sudo apt-get update -qq && sudo apt-get install -y yosys
      - name: Synthesize NTT core (pqc_ntt_stage_banked + lane_fsm)
        run: |
          cd hardware/pqc-rtl
          yosys -q -p "read_verilog -sv rtl/pqc_rvv_cluster_2lane.sv rtl/pqc_ntt_stage_banked.sv; hierarchy -check -top pqc_ntt_stage_banked; proc; opt; stat"
      - name: Synthesize Keccak-p[1600,24] core
        run: |
          cd hardware/pqc-rtl
          yosys -q -p "read_verilog -sv rtl/pqc_keccak_f1600.sv; hierarchy -check -top pqc_keccak_f1600; proc; opt; stat"

  test-pqc-rtl-frozen-vectors-immutable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify frozen reference JSONs still match current golden model (NOT regenerated, only checked)
        run: |
          cd hardware/pqc-rtl
          python3 m2-golden/gen_keccak_round_snapshots.py
          python3 m2-golden/gen_mlkem_frozen_vectors.py
          python3 m2-golden/gen_samplentt_frozen_reference.py
          python3 m2-golden/gen_samplepolycbd_frozen_reference.py
      - name: Fail if any frozen vector file was accidentally modified by the checks above
        run: git diff --exit-code hardware/pqc-rtl/vectors/

  test-pqc-rtl-fips203-coverage-doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify FIPS203_COVERAGE.md mentions every expected algorithm number
        run: |
          cd hardware/pqc-rtl
          python3 check_fips203_coverage.py
